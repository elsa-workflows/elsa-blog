<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Workflow diagnostics and operations workbench</title>
  <desc id="desc">A restrained technical illustration of workflow nodes, diagnostic panels, a key module, and a controlled runtime change path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
