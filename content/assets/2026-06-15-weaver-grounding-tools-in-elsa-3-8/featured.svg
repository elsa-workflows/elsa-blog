<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Workflow graph connected to server-side AI grounding tools</title>
  <desc id="desc">A restrained technical illustration showing a workflow graph routed through a backend boundary to tool modules for activities, workflows, runtime state, and proposals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7faf7"/>
      <stop offset="0.52" stop-color="#edf4f7"/>
      <stop offset="1" stop-color="#f6f1e8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#eef5f1" stop-opacity="0.78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#24403b" flood-opacity="0.15"/>
    </filter>
    <style>
      .line{fill:none;stroke:#66807a;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#8fa39c;stroke-width:2.5;stroke-linecap:round;stroke-dasharray:2 13}
      .node{fill:#ffffff;stroke:#2c7168;stroke-width:5}
      .node-accent{fill:#d8efe6;stroke:#2c7168;stroke-width:5}
      .server{fill:url(#panel);stroke:#2a5d65;stroke-width:4}
      .module{fill:#ffffff;stroke:#8a6b45;stroke-width:4}
      .module-fill{fill:#f3dfbc;stroke:#8a6b45;stroke-width:4}
      .ui{fill:#ffffff;stroke:#5d6f83;stroke-width:4}
      .screen{fill:#e6edf4;stroke:#5d6f83;stroke-width:3}
      .muted{fill:#d7e3de}
      .dark{fill:#203d3a}
      .gold{fill:#d9a946}
      .blue{fill:#6f8fab}
    </style>
  </defs>

